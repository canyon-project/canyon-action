name: 'Canyon Coverage Upload'
description: 'Upload coverage reports to Canyon (filtered by PR changed files)'
branding:
  icon: 'upload-cloud'
  color: 'blue'
inputs:
  coverage-file:
    description: 'Path to coverage JSON file'
    required: true
  canyon-url:
    description: 'Canyon server URL'
    required: true
  canyon-token:
    description: 'Canyon authentication token (optional)'
    required: false
  instrument-cwd:
    description: 'Instrumentation working directory (instrumentCwd). Defaults to current working directory if not provided'
    required: false
  build-target:
    description: 'Build target (optional)'
    required: false
    default: ''
  fail-on-error:
    description: 'Fail the action if upload fails'
    required: false
    default: 'true'
  only-changes:
    description: 'Only upload coverage for PR changed files. Set to false for full coverage'
    required: false
    default: 'true'
runs:
  using: 'node20'
  main: 'dist/index.cjs'
